name: Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          BOOTSTRAP_ADMIN_EMAILS: ${{ secrets.BOOTSTRAP_ADMIN_EMAILS }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          COOKIE_SECURE: "true"
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: REPLICATE_API_TOKEN,AZURE_CLIENT_ID,AZURE_TENANT_ID,AZURE_CLIENT_SECRET,SESSION_SECRET,FRONTEND_URL,BOOTSTRAP_ADMIN_EMAILS,POSTGRES_PASSWORD,COOKIE_SECURE
          script: |
            cd ~/laba-ai-studio

            # Pull latest code
            git pull origin main

            # Write .env
            cat > .env <<EOF
            REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN}
            AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
            AZURE_TENANT_ID=${AZURE_TENANT_ID}
            AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
            SESSION_SECRET=${SESSION_SECRET}
            FRONTEND_URL=${FRONTEND_URL}
            BOOTSTRAP_ADMIN_EMAILS=${BOOTSTRAP_ADMIN_EMAILS}
            VITE_API_URL=${FRONTEND_URL}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            COOKIE_SECURE=${COOKIE_SECURE}
            EOF

            # Build and restart all services
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d --force-recreate

            # Run DB migrations if schema changed
            docker compose exec -T backend node -e "
              import fs from 'fs';
              import pg from 'pg';
              const pool = new pg.Pool({ connectionString: process.env.DATABASE_URL });
              const schema = fs.readFileSync('/app/src/db/schema.sql', 'utf8');
              await pool.query(schema);
              await pool.end();
              console.log('Schema applied');
            "

            # Prune old images
            docker image prune -f
