name: One-time server hardening

on:
  workflow_dispatch:

jobs:
  harden:
    runs-on: ubuntu-latest
    steps:
      - name: Change DB password and harden server
        uses: appleboy/ssh-action@v1
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: POSTGRES_PASSWORD
          script: |
            set -euo pipefail

            echo "==> Changing PostgreSQL password"
            cd ~/laba-ai-studio
            docker compose exec -T postgres psql -U laba -c "ALTER USER laba PASSWORD '${POSTGRES_PASSWORD}';"

            echo "==> Restarting backend to pick up new password"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml restart backend

            echo "==> Waiting for backend health"
            sleep 10
            docker compose ps

            echo "==> DB password changed and backend restarted successfully"

      - name: Apply OS-level hardening (requires root)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail

            echo "==> Installing fail2ban and unattended-upgrades"
            apt-get update -qq
            apt-get install -y -qq fail2ban unattended-upgrades > /dev/null

            echo "==> Configuring fail2ban"
            cat > /etc/fail2ban/jail.local <<'JAIL'
            [DEFAULT]
            bantime  = 3600
            findtime = 600
            maxretry = 5

            [sshd]
            enabled  = true
            port     = ssh
            filter   = sshd
            logpath  = /var/log/auth.log
            maxretry = 3
            bantime  = 7200
            JAIL
            systemctl enable fail2ban
            systemctl restart fail2ban

            echo "==> Hardening SSH"
            sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
            sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
            sed -i 's/^#\?X11Forwarding.*/X11Forwarding no/' /etc/ssh/sshd_config
            sed -i 's/^#\?MaxAuthTries.*/MaxAuthTries 3/' /etc/ssh/sshd_config
            sed -i 's/^#\?AllowAgentForwarding.*/AllowAgentForwarding no/' /etc/ssh/sshd_config
            sed -i 's/^#\?AllowTcpForwarding.*/AllowTcpForwarding no/' /etc/ssh/sshd_config
            grep -q "ClientAliveInterval" /etc/ssh/sshd_config || echo "ClientAliveInterval 300" >> /etc/ssh/sshd_config
            grep -q "ClientAliveCountMax" /etc/ssh/sshd_config || echo "ClientAliveCountMax 2" >> /etc/ssh/sshd_config
            systemctl restart sshd

            echo "==> Hardening kernel (sysctl)"
            cat > /etc/sysctl.d/99-hardening.conf <<'SYSCTL'
            net.ipv4.conf.all.rp_filter = 1
            net.ipv4.conf.default.rp_filter = 1
            net.ipv4.conf.all.accept_redirects = 0
            net.ipv4.conf.default.accept_redirects = 0
            net.ipv4.conf.all.send_redirects = 0
            net.ipv6.conf.all.accept_redirects = 0
            net.ipv4.conf.all.accept_source_route = 0
            net.ipv6.conf.all.accept_source_route = 0
            net.ipv4.tcp_syncookies = 1
            net.ipv4.tcp_max_syn_backlog = 2048
            net.ipv4.tcp_synack_retries = 2
            net.ipv4.icmp_echo_ignore_broadcasts = 1
            net.ipv4.conf.all.log_martians = 1
            net.ipv4.conf.default.log_martians = 1
            kernel.randomize_va_space = 2
            SYSCTL
            sysctl --system > /dev/null

            echo "==> Enabling automatic security updates"
            cat > /etc/apt/apt.conf.d/20auto-upgrades <<'AUTOUPGRADE'
            APT::Periodic::Update-Package-Lists "1";
            APT::Periodic::Unattended-Upgrade "1";
            APT::Periodic::AutocleanInterval "7";
            AUTOUPGRADE

            echo "==> Verifying firewall"
            ufw status | grep -q "Status: active" && echo "UFW is active" || {
              ufw default deny incoming
              ufw default allow outgoing
              ufw allow OpenSSH
              ufw allow 80/tcp
              ufw allow 443/tcp
              ufw --force enable
            }

            echo "==> Verifying port 5432 is NOT open"
            ufw status | grep 5432 && echo "WARNING: 5432 still in UFW" || echo "Good: 5432 not in UFW rules"
            ss -tlnp | grep 5432 && echo "WARNING: something listening on 5432" || echo "Good: nothing listening on 5432 externally"

            echo "==> Server hardening complete"
